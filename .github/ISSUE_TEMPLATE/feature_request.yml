name: Feature request
description: Suggest an idea or enhancement for GumptionChain
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What are you trying to do, and what's getting in the way?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or capability you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why this one is preferable.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that helps — use cases, related issues, references.
