name: Bug report
description: Report a defect in GumptionChain
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. For security vulnerabilities,
        **do not** use this form — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact steps, commands, or a minimal example that triggers the bug.
      placeholder: |
        1. Run `gumptionchain ...`
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error output. This is automatically formatted as code.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `gumptionchain --version` or the commit SHA.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and how you're running it (CLI, dev server, gunicorn, Docker).
    validations:
      required: true
