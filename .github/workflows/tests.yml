name: Tests
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --group dev --python ${{ matrix.python-version }}
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests
      # Node is needed on PATH for the live JS->Python gc-sig cross-verify in
      # tests/test_browser_wallet_parity.py (it shells out to `node`). The
      # browser wallet is pure Web Crypto + vanilla JS — zero npm packages.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
      - run: node --test clients/wallet/*.test.mjs src/gumptionchain/static/js/*.test.mjs
      - run: uv run pytest
      - run: uv run mypy
      # Migration drift gate: upgrade a throwaway SQLite file, then compare
      # `Base.metadata` against the schema implied by the migration history.
      # Four slashes = absolute SQLAlchemy URI (sqlite:////absolute/path),
      # avoiding Flask's relative-URI instance-folder resolution that would
      # otherwise land the file in src/instance/gc_check.db.
      - env:
          FLASK_SQLALCHEMY_DATABASE_URI: sqlite:////${{ runner.temp }}/gc_check.db
        run: |
          uv run gumptionchain db upgrade
          uv run gumptionchain db check
