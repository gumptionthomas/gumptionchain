name: security

# CVE scanning for Python dependencies (pip-audit).
# Runs on every PR and push to main, plus a weekly cron so newly-published
# advisories are surfaced even if the dep tree hasn't changed.
#
# Scope is intentionally minimal: known-fixable vulns fail the build.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "17 7 * * 0"  # Sunday 07:17 UTC, ahead of Monday Dependabot
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-audit:
    name: pip-audit (Python)
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to commit SHAs (not tags) to defend
      # against tag-retargeting supply-chain attacks. Trailing comments
      # carry the exact released version so humans can read the diff;
      # Dependabot (github-actions ecosystem) updates the SHA + comment
      # together.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

      - name: Resolve project requirements
        run: |
          uv export \
            --format requirements-txt \
            --no-hashes \
            --no-emit-project \
            --no-dev \
            > requirements.audit.txt

      # pip-audit is pinned to an exact version for deterministic CI.
      # Bump manually (or surface to Dependabot by adding pip-audit to a
      # tracked manifest like dependency-groups.dev). Installing via pip
      # directly (rather than `uvx`) avoids an ensurepip subprocess that
      # fails inside uv's ephemeral tool environment on GitHub runners.
      - name: Install pip-audit
        run: pip install pip-audit==2.10.0

      - name: Run pip-audit
        run: pip-audit --strict -r requirements.audit.txt
